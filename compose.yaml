version: "3.8"

services:
    db:
        image: postgres:15-alpine
        container_name: postgres-db1
        restart: always
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: password
            POSTGRES_DB: apidb
        ports:
            - "5433:5432"
        volumes:
            - postgres-data:/var/lib/postgresql/data

    app:
        build: .
        container_name: spring-rest-api-byDocker
        depends_on:
            - db
        ports:
            - "8085:8085"
        environment:
            SPRING_DATABASE_URL: jdbc:postgresql://db:5432/apidb
            SPRING_DATABASE_USERNAME: postgres
            SPRING_DATABASE_PASSWORD: password

volumes:
    postgres-data:
